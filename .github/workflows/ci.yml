name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  container-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build image
        run: docker build --pull --tag chatui-ci:${{ github.sha }} .

      - name: Start container
        run: docker run --detach --rm --name chatui-ci -p 8765:8765 chatui-ci:${{ github.sha }}

      - name: Wait for health endpoint
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8765/api/version; then
              exit 0
            fi
            sleep 2
          done
          docker logs chatui-ci
          exit 1

      - name: Verify container health
        shell: bash
        run: |
          set -euo pipefail
          test "$(docker inspect --format '{{.State.Health.Status}}' chatui-ci)" = healthy
          curl -fsS http://127.0.0.1:8765/ >/dev/null

      - name: Show container logs on failure
        if: failure()
        run: docker logs chatui-ci || true

      - name: Stop container
        if: always()
        run: docker stop chatui-ci || true
