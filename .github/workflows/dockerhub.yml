name: Build and push Docker image

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish, for example v1.2.39
        required: true
        type: string

concurrency:
  group: docker-release-${{ github.event.release.tag_name || inputs.version }}
  cancel-in-progress: true

env:
  IMAGE_NAME: chatui
  DOCKERHUB_NAMESPACE: liugangqiang

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver: ${{ steps.version.outputs.semver }}
    steps:
      - name: Validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ github.event.release.tag_name || inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH, for example v1.0.0. Got: $VERSION" >&2
            exit 1
          fi

          SEMVER="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.version.outputs.version }}

      - name: Validate package version
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const expected = process.env.EXPECTED_SEMVER;
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (pkg.version !== expected) {
            throw new Error(`package.json version mismatch: expected ${expected}, got ${pkg.version}`);
          }
          if (fs.existsSync('package-lock.json')) {
            const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
            const rootVersion = lock.packages?.['']?.version;
            if (lock.version !== expected || rootVersion !== expected) {
              throw new Error(`package-lock.json version mismatch: expected ${expected}, got version=${lock.version}, root=${rootVersion}`);
            }
          }
          NODE
        env:
          EXPECTED_SEMVER: ${{ steps.version.outputs.semver }}

  quality:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.version }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build and smoke-test release image
        shell: bash
        run: |
          set -euo pipefail
          docker build --pull --tag chatui-release-test .
          docker run --detach --rm --name chatui-release-test -p 8765:8765 chatui-release-test
          trap 'docker logs chatui-release-test || true; docker stop chatui-release-test || true' EXIT
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8765/api/version; then
              break
            fi
            sleep 2
          done
          test "$(docker inspect --format '{{.State.Health.Status}}' chatui-release-test)" = healthy
          curl -fsS http://127.0.0.1:8765/ >/dev/null

  docker-publish:
    needs:
      - validate
      - quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker metadata for Docker Hub
        id: meta-dockerhub
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.validate.outputs.semver }}
            type=raw,value=${{ needs.validate.outputs.version }}
            type=raw,value=latest

      - name: Docker metadata for Alibaba Cloud ACR
        id: meta-acr
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.validate.outputs.semver }}
            type=raw,value=${{ needs.validate.outputs.version }}
            type=raw,value=latest

      - name: Build once and push to Docker Hub and Alibaba Cloud ACR
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: |
            ${{ steps.meta-dockerhub.outputs.tags }}
            ${{ steps.meta-acr.outputs.tags }}
          labels: |
            ${{ steps.meta-dockerhub.outputs.labels }}
            ${{ steps.meta-acr.outputs.labels }}
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,scope=${{ env.IMAGE_NAME }},mode=max
