name: Build and push Docker image
run-name: Build ChatUI ${{ github.ref_name || inputs.version }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish, for example v1.2.39
        required: true
        type: string

concurrency:
  group: docker-release-${{ github.ref_name || inputs.version }}
  cancel-in-progress: true

env:
  IMAGE_NAME: chatui
  DOCKERHUB_NAMESPACE: liugangqiang

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver: ${{ steps.version.outputs.semver }}
    steps:
      - name: Validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ github.ref_name || inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH, for example v1.0.0. Got: $VERSION" >&2
            exit 1
          fi

          SEMVER="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.version.outputs.version }}

      - name: Validate package version
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const expected = process.env.EXPECTED_SEMVER;
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (pkg.version !== expected) {
            throw new Error(`package.json version mismatch: expected ${expected}, got ${pkg.version}`);
          }
          if (fs.existsSync('package-lock.json')) {
            const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
            const rootVersion = lock.packages?.['']?.version;
            if (lock.version !== expected || rootVersion !== expected) {
              throw new Error(`package-lock.json version mismatch: expected ${expected}, got version=${lock.version}, root=${rootVersion}`);
            }
          }
          NODE
        env:
          EXPECTED_SEMVER: ${{ steps.version.outputs.semver }}

  docker-publish:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker metadata for Docker Hub
        id: meta-dockerhub
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.validate.outputs.semver }}
            type=raw,value=${{ needs.validate.outputs.version }}
            type=raw,value=latest

      - name: Docker metadata for Alibaba Cloud ACR
        id: meta-acr
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.validate.outputs.semver }}
            type=raw,value=${{ needs.validate.outputs.version }}
            type=raw,value=latest

      - name: Build once and push to Docker Hub and Alibaba Cloud ACR
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: |
            ${{ steps.meta-dockerhub.outputs.tags }}
            ${{ steps.meta-acr.outputs.tags }}
          labels: |
            ${{ steps.meta-dockerhub.outputs.labels }}
            ${{ steps.meta-acr.outputs.labels }}
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,scope=${{ env.IMAGE_NAME }},mode=max

  github-release:
    name: Publish GitHub Release
    needs: [validate, docker-publish]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Create or update GitHub Release
        uses: actions/github-script@v9
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;
            const release = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ChatUI ${tag}`,
              body: `## Docker release\n\nDocker images for \`${tag}\` were built and published successfully.`,
              draft: false,
              prerelease: false,
            };
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              await github.rest.repos.updateRelease({ ...release, release_id: existing.data.id });
              core.info(`Updated GitHub Release for ${tag}.`);
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.repos.createRelease(release);
              core.info(`Created GitHub Release for ${tag}.`);
            }
