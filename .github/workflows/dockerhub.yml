name: Build and push Docker image
run-name: Build ChatUI ${{ inputs.version || github.ref_name }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish, for example v1.2.39
        required: true
        type: string

concurrency:
  group: docker-release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: true

env:
  IMAGE_NAME: chatui
  DOCKERHUB_NAMESPACE: liugangqiang

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver: ${{ steps.version.outputs.semver }}
    steps:
      - name: Validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ inputs.version || github.ref_name }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH, for example v1.0.0. Got: $VERSION" >&2
            exit 1
          fi

          SEMVER="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.version.outputs.version }}

      - name: Validate release metadata
        run: node scripts/verify-release.js "${{ steps.version.outputs.version }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run release checks
        run: npm run check

  docker-publish:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker metadata for Docker Hub
        id: meta-dockerhub
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.validate.outputs.semver }}
            type=raw,value=${{ needs.validate.outputs.version }}
            type=raw,value=latest

      - name: Docker metadata for Alibaba Cloud ACR
        id: meta-acr
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.validate.outputs.semver }}
            type=raw,value=${{ needs.validate.outputs.version }}
            type=raw,value=latest

      - name: Build once and push to Docker Hub and Alibaba Cloud ACR
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: |
            ${{ steps.meta-dockerhub.outputs.tags }}
            ${{ steps.meta-acr.outputs.tags }}
          labels: |
            ${{ steps.meta-dockerhub.outputs.labels }}
            ${{ steps.meta-acr.outputs.labels }}
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,scope=${{ env.IMAGE_NAME }},mode=max

  github-release:
    name: Publish GitHub Release
    needs: [validate, docker-publish]
    if: github.event_name == 'push' || inputs.version != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout release notes
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.version }}

      - name: Create or update GitHub Release
        uses: actions/github-script@v9
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;
            const notesPath = `docs/releases/${tag}.md`;
            const body = require('fs').readFileSync(notesPath, 'utf8').trim();
            if (!body) throw new Error(`Release notes are empty: ${notesPath}`);
            const release = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ChatUI ${tag}`,
              body,
              draft: false,
              prerelease: false,
            };
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              await github.rest.repos.updateRelease({ ...release, release_id: existing.data.id });
              core.info(`Updated GitHub Release for ${tag}.`);
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.repos.createRelease(release);
              core.info(`Created GitHub Release for ${tag}.`);
            }
